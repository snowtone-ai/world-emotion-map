name: Data Pipeline & Anomaly Detection

on:
  schedule:
    - cron: "5 * * * *"   # Every hour at :05 — data pipeline + anomaly detection
    - cron: "10 0,12 * * *"  # UTC 0:10, 12:10 — X scheduled post (every 12h)
  workflow_dispatch:
    inputs:
      skip_pipeline:
        description: "Skip fetch+aggregate (anomaly + X post only)"
        type: boolean
        default: false
      skip_anomaly:
        description: "Skip anomaly detection"
        type: boolean
        default: false
      post_mode:
        description: "X post mode to run manually (scheduled / anomaly / none)"
        type: choice
        options:
          - none
          - scheduled
          - anomaly
        default: none

env:
  NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
  SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
  X_API_KEY: ${{ secrets.X_API_KEY }}
  X_API_SECRET: ${{ secrets.X_API_SECRET }}
  X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
  X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
  WEM_BASE_URL: ${{ vars.WEM_BASE_URL }}

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      # ── Data pipeline (every hour) ──────────────────────────
      - name: Fetch GDELT & Aggregate
        # Run on schedule (hourly) or on manual dispatch unless skipped
        if: |
          (github.event_name == 'schedule' && github.event.schedule == '5 * * * *') ||
          (github.event_name == 'workflow_dispatch' && inputs.skip_pipeline != true)
        run: pnpm tsx scripts/fetch-gdelt.ts | pnpm tsx scripts/aggregate.ts

      # ── Anomaly detection (every hour) ─────────────────────
      # PAUSED: Re-enable by removing `false &&` (command: /異常検知再開)
      - name: Detect Anomalies
        if: |
          false &&
          ((github.event_name == 'schedule' && github.event.schedule == '5 * * * *') ||
          (github.event_name == 'workflow_dispatch' && inputs.skip_anomaly != true))
        run: pnpm tsx --env-file /dev/null scripts/detect-anomaly.ts

      # ── X: post anomaly if PENDING (every hour, after detection) ──
      # PAUSED: Re-enable by removing `false &&` (command: /異常検知再開)
      - name: Post Anomaly to X
        if: |
          false &&
          ((github.event_name == 'schedule' && github.event.schedule == '5 * * * *') ||
          (github.event_name == 'workflow_dispatch' && inputs.post_mode == 'anomaly'))
        run: pnpm tsx --env-file /dev/null scripts/post-to-x.ts --mode anomaly

      # ── X: scheduled 12h post ───────────────────────────────
      - name: Post Scheduled Update to X
        if: |
          (github.event_name == 'schedule' && github.event.schedule == '10 0,12 * * *') ||
          (github.event_name == 'workflow_dispatch' && inputs.post_mode == 'scheduled')
        run: pnpm tsx --env-file /dev/null scripts/post-to-x.ts --mode scheduled
